<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaChain Mini App</title>

    <link rel="stylesheet" href="style.css">
    
<script>
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: "https://novachain-miniapp.aytekinm099.workers.dev/tonconnect-manifest.json",
    buttonRootId: "ton-connect"
});

const walletInfo = document.createElement("div");
walletInfo.style.marginTop = "20px";
walletInfo.style.color = "white";
walletInfo.style.fontSize = "16px";
document.querySelector(".container").appendChild(walletInfo);

tonConnectUI.onStatusChange(wallet => {
    if (wallet) {
        const address = wallet.account.address;

        walletInfo.innerHTML = `
            <h3>✅ Wallet Connected</h3>
            <p>${address}</p>
        `;
    } else {
        walletInfo.innerHTML = "";
    }
});
</script>
    

<body>

<div class="container">

    <h1>🚀 NovaChain</h1>

    <p>TON üzerindeki NovaChain'e hoş geldiniz.</p>

    <div id="ton-connect"></div>

</div>

<script>
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: "https://novachain-miniapp.aytekinm099.workers.dev/tonconnect-manifest.json",
    buttonRootId: "ton-connect"
});

tonConnectUI.onStatusChange(wallet => {
    if (wallet) {
        console.log("Wallet connected:", wallet.account.address);
        alert("NovaChain'e başarıyla bağlandınız!");
    }
});
</script>

</body>
</html>
