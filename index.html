<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaChain Mini App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🚀 NovaChain</h1>

    <p class="subtitle">
        TON Blockchain üzerindeki NovaChain'e hoş geldiniz.
    </p>

    <!-- Wallet Connect -->
    <div id="ton-connect"></div>

    <!-- Wallet Card -->
    <div class="card">
        <h2>👛 Wallet</h2>

        <p id="wallet-address">
            Wallet bağlı değil
        </p>
    </div>

    <!-- GRAM Balance -->
    <div class="card">
        <h2>💰 GRAM Balance</h2>

        <p id="gram-balance">
            0 GRAM
        </p>
    </div>

    <!-- NOVA Balance -->
    <div class="card">
        <h2>💎 NOVA Balance</h2>

        <p id="nova-balance">
            0 NOVA
        </p>
    </div>

    <!-- Buttons -->

    <button id="claimButton">
        🎁 Claim Airdrop
    </button>

    <button id="tasksButton">
        📋 Tasks
    </button>

    <button id="referralButton">
        👥 Referral
    </button>

    <button id="stakingButton">
        🔒 Staking
    </button>

</div>

<!-- TON Connect -->
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<!-- TON Library -->
<script src="https://unpkg.com/ton@15/dist/ton.js"></script>

<!-- Script -->
<script src="script.js"></script>

</body>
</html>
