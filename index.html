
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaChain Mini App</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>

<body>

<div class="container">

    <h1>🚀 NovaChain</h1>

    <p>TON üzerindeki NovaChain'e hoş geldiniz.</p>

    <div id="ton-connect"></div>

    <div id="wallet-info" style="margin-top:20px;color:white;"></div>

</div>

<script>
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: "https://novachain-miniapp.aytekinm099.workers.dev/tonconnect-manifest.json",
    buttonRootId: "ton-connect"
});

const walletInfo = document.getElementById("wallet-info");

tonConnectUI.onStatusChange(wallet => {

    if (wallet) {

        const address = wallet.account.address;

        walletInfo.innerHTML = `
            <h3>✅ Wallet Connected</h3>
            <p>${address}</p>
        `;

    } else {

        walletInfo.innerHTML = `
            <p>Cüzdan bağlı değil.</p>
        `;

    }

});
</script>

</body>
</html>
