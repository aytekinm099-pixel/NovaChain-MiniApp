<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaChain Mini App</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

</head>

<body>

<div class="container">

<h1>🚀 NovaChain</h1>

<p>TON Blockchain üzerindeki NovaChain'e hoş geldiniz.</p>

<div id="ton-connect"></div>

<div id="wallet-info"></div>

<div class="card">
<h3>👛 Wallet</h3>
<p id="wallet-address">Bağlı Değil</p>
</div>

<div class="card">
<h3>💰 GRAM Balance</h3>
<p id="gram-balance">0 GRAM</p>
</div>

<div class="card">
<h3>💎 NOVA Balance</h3>
<p id="nova-balance">0 NOVA</p>
</div>

<button id="claimButton">
🎁 Claim Airdrop
</button>

</div>

<script src="script.js"></script>

</body>
</html>
